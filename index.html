<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorDev | OpenRouter Chat</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/sidebar.css">
    <link rel="stylesheet" href="style/chat.css">
    <link rel="stylesheet" href="style/modal.css">
    
    <!-- External Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div id="app" class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__top">
                <button class="btn-new-chat" id="btn-new-chat">
                    <svg class="icon"><use href="#icon-plus"></use></svg>
                    New Chat
                </button>
            </div>
            
            <div class="sidebar__sessions" id="session-list">
                <!-- Managed by JS -->
            </div>

            <div class="sidebar__bottom" id="btn-settings-open">
                <div class="user-profile">
                    <div class="user-profile__avatar">MD</div>
                    <div class="user-profile__info">
                        <div class="user-profile__name">MentorDev User</div>
                        <div class="user-profile__status">API: Connected</div>
                    </div>
                    <svg class="icon"><use href="#icon-settings"></use></svg>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header__left">
                    <button class="btn-sidebar-toggle" id="btn-sidebar-toggle">
                        <svg class="icon"><use href="#icon-menu"></use></svg>
                    </button>
                    <div class="model-selector" id="btn-model-selector">
                        <div class="indicator indicator--pulse"></div>
                        <span class="model-selector__name" id="current-model-name">anthropic/claude-3-sonnet</span>
                        <svg class="icon icon--sm" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                    </div>
                </div>
                <div class="header__right">
                    <button class="btn-icon" id="btn-export-chat" title="Export Chat Markdown">
                        <svg class="icon"><use href="#icon-download"></use></svg>
                    </button>
                </div>
            </header>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Managed by JS -->
                </div>

                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea 
                            id="chat-input"
                            class="chat-input"
                            placeholder="Ask MentorDev anything..."
                            rows="1"
                        ></textarea>
                        <div class="input-tools">
                            <button class="btn-tool" id="btn-system-prompt" title="System Prompt">
                                <svg class="icon"><use href="#icon-settings"></use></svg>
                            </button>
                            <div class="divider-vertical"></div>
                            <span class="shortcut-hint">Ctrl + Enter to send</span>
                        </div>
                        <button class="btn-send" id="btn-send">
                            <svg class="icon"><use href="#icon-send"></use></svg>
                        </button>
                    </div>
                    <div class="app-footer">
                        Mentoring with Precision via OpenRouter • v1.0.4
                    </div>
                </div>
            </div>
            
            <div class="background-effects">
               <div class="glow glow--teal"></div>
               <div class="glow glow--blue"></div>
            </div>
        </main>
        
        <!-- Modals -->
        <div class="modal-overlay" id="modal-settings" style="display: none;">
            <div class="modal" id="settings-modal-content">
                <div class="modal__header">
                    <h2 class="modal__title">Settings</h2>
                    <button class="btn-icon btn-close-modal" id="btn-close-settings">
                        <svg class="icon"><use href="#icon-plus" style="transform: rotate(45deg);"></use></svg>
                    </button>
                </div>
                <div class="modal__body">
                    <div class="form-group">
                        <label for="settings-api-key" class="form-label">OpenRouter API Key</label>
                        <input type="password" id="settings-api-key" placeholder="sk-or-v1-..." class="form-input">
                        <div class="form-hint">Your key is stored locally in your browser.</div>
                    </div>
                    <div class="form-group">
                        <label for="settings-system-prompt" class="form-label">Default System Prompt</label>
                        <textarea id="settings-system-prompt" class="form-input form-textarea" rows="3" placeholder="You are a helpful AI assistant."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="settings-temperature" class="form-label">Temperature: <span id="val-temperature">0.7</span></label>
                        <input type="range" id="settings-temperature" min="0" max="2" step="0.1" value="0.7" class="form-slider">
                    </div>
                    <div class="form-group">
                        <label for="settings-top-p" class="form-label">Top-P: <span id="val-top-p">1.0</span></label>
                        <input type="range" id="settings-top-p" min="0" max="1" step="0.05" value="1.0" class="form-slider">
                    </div>
                    <div class="form-group">
                        <label for="settings-max-tokens" class="form-label">Max Tokens</label>
                        <input type="number" id="settings-max-tokens" min="128" max="32768" value="4096" class="form-input">
                    </div>
                    <div class="form-group form-group--inline">
                        <label class="form-label">Theme</label>
                        <div class="theme-toggle">
                            <button class="btn-theme active" data-theme="system">System</button>
                            <button class="btn-theme" data-theme="dark">Dark</button>
                            <button class="btn-theme" data-theme="light">Light</button>
                        </div>
                    </div>
                    <div class="modal__danger-zone">
                        <button class="btn-danger" id="btn-clear-data">Clear All Data</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-overlay" id="modal-models" style="display: none;">
            <div class="modal" id="models-modal-content" style="max-height: 80vh;">
                <div class="modal__header">
                    <h2 class="modal__title">Select Model</h2>
                    <button class="btn-icon btn-close-modal" id="btn-close-models">
                        <svg class="icon"><use href="#icon-plus" style="transform: rotate(45deg);"></use></svg>
                    </button>
                </div>
                <div class="modal__body" style="padding-top: 0; padding-bottom: 0;">
                    <div class="model-search-container" style="position: sticky; top: 0; background-color: var(--bg-surface); padding: 1.5rem 0 1rem; z-index: 2; border-bottom: 1px solid var(--border-subtle);">
                        <div style="position: relative;">
                            <svg class="icon" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-dim);"><use href="#icon-search"></use></svg>
                            <input type="text" id="input-search-models" class="form-input" style="width: 100%; padding-left: 2.5rem;" placeholder="Search models by name or ID...">
                        </div>
                        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                            <button class="btn-filter active" data-filter="all">All Models</button>
                            <button class="btn-filter" data-filter="free">Free API Only</button>
                        </div>
                    </div>
                    <div class="models-list" id="models-list-container" style="padding: 1rem 0; overflow-y: auto;">
                        <div style="text-align: center; color: var(--text-dim); padding: 2rem;">Loading models... Make sure your API key is set.</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="toast-container" id="toast-container"></div>
    </div>

    <!-- Inline icons definition included as requested -->
    <div style="display: none;" id="icons-container"></div>
    <script>
        fetch('assets/icons.svg').then(r=>r.text()).then(t=>document.getElementById('icons-container').innerHTML = t);
    </script>

    <!-- JS Modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
